name: بناء APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: بناء APK لأندرويد
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: سحب الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: إعداد Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: تثبيت pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: تثبيت المكتبات
        run: |
          cd artifacts/ussd-app
          pnpm install --no-frozen-lockfile

      - name: تشغيل Expo Prebuild
        run: |
          cd artifacts/ussd-app
          npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: إعطاء صلاحيات Gradle
        run: chmod +x artifacts/ussd-app/android/gradlew

      - name: تجميع الـ APK
        run: |
          cd artifacts/ussd-app/android
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: رفع الـ APK
        uses: actions/upload-artifact@v4
        with:
          name: USSD-Visual-App-APK
          path: artifacts/ussd-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
