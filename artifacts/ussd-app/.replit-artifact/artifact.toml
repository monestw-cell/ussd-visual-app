kind = "mobile"
previewPath = "/"
title = "USSD بواجهة مرئية"
version = "1.0.0"
id = "artifacts/ussd-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18239

[services.development]
run = "pnpm --filter @workspace/ussd-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ussd-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ussd-app", "run", "serve" ]

[services.env]
PORT = "18239"
BASE_PATH = "/"
